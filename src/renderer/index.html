<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --letter-spacing: -0.03em;
      --bg-main: #f9f9fb;
      --bg-editor: #ffffff;
      --text-primary: #1a1a1e;
      --text-secondary: #6b6b76;
      --text-dim: #9c9ca8;
      --text-faded: #c7c7d0;
      --accent: #2f6de1;
      --border: #dfdfe6;
      --selection: rgba(47, 109, 225, 0.15);
      --editor-font-size: 17px;
      --editor-line-height: 1.75;
      --editor-max-width: 720px;
      --editor-padding: 80px;
      --syntax-opacity: 0.3;
      --focus-dim-opacity: 0.2;
      --code-bg: #f5f5f7;
      --blockquote-border: var(--accent);
      --blockquote-color: var(--text-secondary);
      --hr-color: var(--border);
      --link-color: var(--accent);
    }

    .dark {
      --bg-main: #1a1a1e;
      --bg-editor: #1e1e24;
      --text-primary: #e8e8ed;
      --text-secondary: #8b8b96;
      --text-dim: #5a5a66;
      --text-faded: #3a3a44;
      --accent: #8b83ff;
      --border: #2a2a34;
      --selection: rgba(139, 131, 255, 0.2);
      --code-bg: #262630;
      --blockquote-border: var(--accent);
      --blockquote-color: var(--text-secondary);
      --hr-color: var(--border);
      --link-color: var(--accent);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-display);
      background: var(--bg-main);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #titlebar {
      height: 38px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 12px 0 80px; /* 80px left: space for macOS traffic light buttons */
      background: var(--bg-main);
      border-bottom: 1px solid var(--border);
      transition: opacity 0.3s;
    }
    .zen-mode #titlebar { opacity: 0; height: 0; min-height: 0; border: none; padding: 0; overflow: hidden; }
    .zen-mode #titlebar:hover { opacity: 1; height: 38px; min-height: 38px; padding: 0 12px 0 80px; border-bottom: 1px solid var(--border); }

    #titlebar-title {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 600;
      letter-spacing: var(--letter-spacing);
      color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; -webkit-app-region: no-drag;
    }

    #titlebar-actions { display: flex; gap: 6px; -webkit-app-region: no-drag; }

    .titlebar-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 11px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: var(--letter-spacing);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-app-region: no-drag;
      white-space: nowrap;
    }
    .titlebar-btn:hover { background: var(--text-primary); color: var(--bg-main); border-color: var(--text-primary); }
    .titlebar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #editor-wrapper {
      height: calc(100vh - 38px);
      overflow-y: auto; overflow-x: hidden;
      background: var(--bg-editor); transition: background 0.3s;
    }
    .zen-mode #editor-wrapper { height: 100vh; }

    #editor-container {
      max-width: var(--editor-max-width);
      margin: 0 auto;
      padding: 60px var(--editor-padding) 200px var(--editor-padding);
      min-height: 100%;
    }

    /* ═══ CodeMirror base overrides ═══ */
    .cm-editor {
      font-family: var(--font-display) !important;
      font-size: var(--editor-font-size) !important;
      line-height: var(--editor-line-height) !important;
      letter-spacing: var(--letter-spacing) !important;
      color: var(--text-primary) !important;
      background: transparent !important;
      height: auto !important;
    }
    .cm-editor .cm-content { padding: 0 !important; caret-color: var(--accent) !important; }
    .cm-editor .cm-cursor { border-left-color: var(--accent) !important; border-left-width: 2px !important; }
    .cm-editor .cm-selectionBackground, .cm-editor ::selection { background: var(--selection) !important; }
    .cm-editor .cm-gutters { display: none !important; }
    .cm-editor.cm-focused { outline: none !important; }
    .cm-editor .cm-scroller:focus { outline: none !important; }
    .cm-editor .cm-content:focus { outline: none !important; }
    .cm-editor .cm-scroller { overflow: visible !important; }
    .cm-editor .cm-line { padding: 0 !important; }

    /* ═══ Syntax tokens (always applied) ═══ */
    .cm-editor .cm-token-faded { opacity: var(--syntax-opacity) !important; color: var(--text-secondary) !important; }

    /* ═══ Visual mode decorations ═══ */
    .cm-editor .cm-visual-bold { font-weight: 700 !important; }
    .cm-editor .cm-visual-italic { font-style: italic !important; }
    .cm-editor .cm-visual-code {
      font-family: var(--font-mono) !important;
      font-size: 0.9em !important;
      background: var(--code-bg) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
    }
    .cm-editor .cm-visual-link {
      color: var(--link-color) !important;
      text-decoration: underline !important;
      text-decoration-style: dotted !important;
      text-underline-offset: 2px !important;
    }

    /* ═══ Headings ═══ */
    .cm-editor .cm-header-1 {
      font-family: var(--font-display) !important;
      font-size: 2em !important; font-weight: 800 !important;
      letter-spacing: var(--letter-spacing) !important;
      line-height: 1.3 !important;
    }
    .cm-editor .cm-header-2 {
      font-family: var(--font-display) !important;
      font-size: 1.5em !important; font-weight: 700 !important;
      letter-spacing: var(--letter-spacing) !important;
      line-height: 1.35 !important;
    }
    .cm-editor .cm-header-3 {
      font-family: var(--font-display) !important;
      font-size: 1.2em !important; font-weight: 600 !important;
      letter-spacing: var(--letter-spacing) !important;
    }

    /* Heading line spacing — adds margin above/below heading lines */
    .cm-editor .cm-line-heading-1 { margin-top: 1.5em !important; }
    .cm-editor .cm-line-heading-2 { margin-top: 1.2em !important; }
    .cm-editor .cm-line-heading-3 { margin-top: 1em !important; }

    /* ═══ Blockquote ═══ */
    .cm-editor .cm-blockquote-line {
      border-left: 3px solid var(--blockquote-border) !important;
      padding-left: 16px !important;
      color: var(--blockquote-color) !important;
    }

    /* ═══ List bullets ═══ */
    .cm-editor .cm-visual-bullet {
      color: var(--text-secondary) !important;
      margin-right: 6px !important;
      display: inline-block !important;
    }
    .cm-editor .cm-visual-number {
      color: var(--text-secondary) !important;
      margin-right: 4px !important;
      font-variant-numeric: tabular-nums !important;
    }

    /* ═══ Horizontal rule ═══ */
    .cm-editor .cm-visual-hr {
      border: none !important;
      border-top: 1px solid var(--hr-color) !important;
      margin: 1.5em 0 !important;
    }

    /* ═══ Image placeholder ═══ */
    .cm-editor .cm-visual-image {
      color: var(--accent) !important;
      font-size: 0.9em !important;
      font-style: italic !important;
    }

    /* ═══ Paragraph spacing ═══ */
    /* Visual mode: add spacing between paragraphs (blank lines between text blocks) */
    .cm-editor.visual-mode .cm-line:empty + .cm-line:not(:empty) {
      padding-top: 0.4em !important;
    }

    /* ═══ MD mode: show raw syntax ═══ */
    .cm-editor.md-mode .cm-content {
      font-family: var(--font-mono) !important;
      letter-spacing: normal !important;
    }

    /* ═══ Focus mode ═══ */
    .cm-editor.focus-mode .cm-line { transition: opacity 0.3s ease; }
    .cm-editor.focus-mode .cm-line.cm-dimmed-line { opacity: var(--focus-dim-opacity) !important; }

    /* ═══ Task markers ═══ */
    .cm-editor .cm-task-marker { color: var(--accent) !important; font-weight: 500 !important; }

    /* Switcher */
    #switcher-overlay {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.5); z-index:1000;
      justify-content:center; align-items:flex-start; padding-top:20vh; backdrop-filter:blur(4px);
    }
    #switcher-overlay.open { display:flex; }
    #switcher-box { background:var(--bg-editor); border:1px solid var(--border); border-radius:12px; width:480px; max-height:50vh; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    #switcher-input { width:100%; padding:16px 20px; font-family:var(--font-mono); font-size:14px; background:transparent; color:var(--text-primary); border:none; border-bottom:1px solid var(--border); outline:none; }
    #switcher-input::placeholder { color:var(--text-dim); }
    #switcher-list { list-style:none; max-height:40vh; overflow-y:auto; padding:4px; }
    .switcher-item { display:flex; align-items:center; padding:10px 16px; border-radius:8px; cursor:pointer; color:var(--text-primary); font-family:var(--font-mono); font-size:13px; transition:background .1s; }
    .switcher-item:hover, .switcher-item.selected { background:var(--selection); }
    .switcher-item .file-icon { margin-right:10px; color:var(--text-dim); }
    .switcher-item .file-name { flex:1; }
    .switcher-item .file-time { color:var(--text-dim); font-size:11px; }

    /* Scrollbar */
    #editor-wrapper::-webkit-scrollbar { width:6px; }
    #editor-wrapper::-webkit-scrollbar-track { background:transparent; }
    #editor-wrapper::-webkit-scrollbar-thumb { background:var(--text-faded); border-radius:3px; }
    #editor-wrapper::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

    /* Empty state */
    #empty-state { display:none; justify-content:center; align-items:center; height:100%; text-align:center; color:var(--text-dim); font-family:var(--font-display); }
    #empty-state.visible { display:flex; }
    #empty-state h2 { font-weight:700; font-size:24px; letter-spacing:var(--letter-spacing); color:var(--text-secondary); margin-bottom:8px; }
    #empty-state p { font-size:14px; }
    #empty-state kbd { background:var(--bg-main); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-family:var(--font-mono); font-size:12px; }

    /* ═══ CodeMirror tooltip overrides (fix dark popup in light mode) ═══ */
    .cm-tooltip {
      background: var(--bg-editor) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
      color: var(--text-primary) !important;
    }
    .cm-tooltip.cm-completionInfo,
    .cm-completionList {
      background: var(--bg-editor) !important;
    }
    .cm-completionList .cm-completionItem { color: var(--text-primary) !important; }
    .cm-completionList .cm-completionItem[aria-selected] { background: var(--selection) !important; }

    /* ═══ Word count status bar ═══ */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      background: transparent;
      pointer-events: none;
      z-index: 10;
    }
    #word-count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-faded);
      letter-spacing: 0;
      transition: opacity 0.3s;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="titlebar-title">Gabo</span>
    <div id="titlebar-actions">
      <button class="titlebar-btn" id="btn-focus" title="Focus Mode (⌘D)">Focus</button>
      <button class="titlebar-btn" id="btn-md" title="Markdown Mode (⌘⇧M)">.MD</button>
      <button class="titlebar-btn" id="btn-dark" title="Dark Mode (⌘⇧D)">☽</button>
    </div>
  </div>

  <div id="editor-wrapper">
    <div id="editor-container"></div>
    <div id="empty-state">
      <div>
        <h2>Start writing</h2>
        <p>Press <kbd>⌘O</kbd> to open a file, or just start typing</p>
      </div>
    </div>
  </div>

  <div id="switcher-overlay">
    <div id="switcher-box">
      <input type="text" id="switcher-input" placeholder="Search files..." autocomplete="off">
      <ul id="switcher-list"></ul>
    </div>
  </div>

  <div id="statusbar">
    <span id="word-count"></span>
  </div>

  <script src="renderer.bundle.js"></script>
</body>
</html>
