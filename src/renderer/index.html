<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --letter-spacing: -0.03em;
      --bg-main: #e8e8e6;       /* warm pastel gray — Raycast-style, easy on the eyes */
      --bg-editor: #f2f2f0;     /* slightly lighter warm gray for writing area */
      --text-primary: #1a1a1e;
      --text-secondary: #5c5c63;
      --text-dim: #9c9ca8;
      --text-faded: #bdbdb8;
      --accent: #2f6de1;
      --border: #d4d4d0;
      --selection: rgba(47, 109, 225, 0.15);
      --editor-font-size: 17px;
      --editor-line-height: 1.75;
      --editor-max-width: 720px;
      --editor-padding: 80px;
      --syntax-opacity: 0.3;
      --focus-dim-opacity: 0.2;
      --code-bg: #e8e8e5;
      --blockquote-border: var(--accent);
      --blockquote-color: var(--text-secondary);
      --hr-color: var(--border);
      --link-color: var(--accent);
    }

    .dark {
      --bg-main: #1a1a1e;
      --bg-editor: #1e1e24;
      --text-primary: #e8e8e6;  /* same warm beige as light mode background */
      --text-secondary: #8b8b96;
      --text-dim: #5a5a66;
      --text-faded: #3a3a44;
      --accent: #8b83ff;
      --border: #2a2a34;
      --selection: rgba(139, 131, 255, 0.2);
      --code-bg: #262630;
      --blockquote-border: var(--accent);
      --blockquote-color: var(--text-secondary);
      --hr-color: var(--border);
      --link-color: var(--accent);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-display);
      background: var(--bg-main);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #titlebar {
      height: 38px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 12px 0 80px; /* 80px left: space for macOS traffic light buttons */
      background: var(--bg-main);
      border-bottom: 1px solid var(--border);
      transition: opacity 0.3s;
    }
    .zen-mode #titlebar { opacity: 0; height: 0; min-height: 0; border: none; padding: 0; overflow: hidden; }
    .zen-mode #titlebar:hover { opacity: 1; height: 38px; min-height: 38px; padding: 0 12px 0 80px; border-bottom: 1px solid var(--border); }

    /* Editable centered filename */
    #titlebar-title-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 5px;
      max-width: 44%;
      -webkit-app-region: no-drag;
    }
    #titlebar-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: var(--letter-spacing);
      color: var(--text-primary);
      background: transparent;
      border: none;
      outline: none;
      text-align: center;
      min-width: 40px;
      max-width: 340px;
      width: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
      padding: 2px 6px;
      border-radius: 5px;
      transition: background 0.15s;
      pointer-events: auto;
    }
    #titlebar-title[data-editable="true"]:hover { background: var(--selection); cursor: text; }
    #titlebar-title:focus { background: var(--selection); cursor: text; outline: none; }
    /* Unsaved dot */
    #title-dirty {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #title-dirty.visible { opacity: 1; }

    #titlebar-actions { display: flex; gap: 8px; margin-left: auto; -webkit-app-region: no-drag; align-items: center; }

    /* ── Round icon buttons ── */
    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-editor);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .icon-btn:hover {
      background: var(--text-primary);
      color: var(--bg-main);
      border-color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .icon-btn svg { display: block; }

    /* Moon shown in light mode, Sun shown in dark mode */
    #btn-dark .icon-sun { display: none; }
    .dark #btn-dark .icon-moon { display: none; }
    .dark #btn-dark .icon-sun { display: block; }

    #editor-wrapper {
      height: calc(100vh - 38px);
      overflow-y: auto; overflow-x: hidden;
      background: var(--bg-editor); transition: background 0.3s;
    }
    .zen-mode #editor-wrapper { height: 100vh; }

    #editor-container {
      max-width: var(--editor-max-width);
      margin: 0 auto;
      padding: 60px var(--editor-padding) 200px var(--editor-padding);
      min-height: 100%;
    }

    /* ═══ CodeMirror base overrides ═══ */
    .cm-editor {
      font-family: var(--font-display) !important;
      font-size: var(--editor-font-size) !important;
      line-height: var(--editor-line-height) !important;
      letter-spacing: var(--letter-spacing) !important;
      color: var(--text-primary) !important;
      background: transparent !important;
      height: auto !important;
    }
    .cm-editor .cm-content { padding: 0 !important; caret-color: var(--accent) !important; }
    .cm-editor .cm-cursor { border-left-color: var(--accent) !important; border-left-width: 2px !important; }
    .cm-editor .cm-selectionBackground, .cm-editor ::selection { background: var(--selection) !important; }
    .cm-editor .cm-gutters { display: none !important; }
    .cm-editor.cm-focused { outline: none !important; }
    .cm-editor .cm-scroller:focus { outline: none !important; }
    .cm-editor .cm-content:focus { outline: none !important; }
    .cm-editor .cm-scroller { overflow: visible !important; }
    .cm-editor .cm-line { padding: 0 !important; }

    /* ═══ Syntax tokens (always applied) ═══ */
    .cm-editor .cm-token-faded { opacity: var(--syntax-opacity) !important; color: var(--text-secondary) !important; }

    /* ═══ Visual mode decorations ═══ */
    .cm-editor .cm-visual-bold { font-weight: 700 !important; }
    .cm-editor .cm-visual-italic { font-style: italic !important; }
    .cm-editor .cm-visual-code {
      font-family: var(--font-mono) !important;
      font-size: 0.9em !important;
      background: var(--code-bg) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
    }
    .cm-editor .cm-visual-link {
      color: var(--link-color) !important;
      text-decoration: underline !important;
      text-decoration-style: dotted !important;
      text-underline-offset: 2px !important;
    }

    /* ═══ Headings ═══ */
    .cm-editor .cm-header-1 {
      font-family: var(--font-display) !important;
      font-size: 2em !important; font-weight: 800 !important;
      letter-spacing: var(--letter-spacing) !important;
      line-height: 1.3 !important;
    }
    .cm-editor .cm-header-2 {
      font-family: var(--font-display) !important;
      font-size: 1.5em !important; font-weight: 700 !important;
      letter-spacing: var(--letter-spacing) !important;
      line-height: 1.35 !important;
    }
    .cm-editor .cm-header-3 {
      font-family: var(--font-display) !important;
      font-size: 1.2em !important; font-weight: 600 !important;
      letter-spacing: var(--letter-spacing) !important;
    }

    /* Heading line spacing — adds margin above/below heading lines */
    .cm-editor .cm-line-heading-1 { margin-top: 1.5em !important; }
    .cm-editor .cm-line-heading-2 { margin-top: 1.2em !important; }
    .cm-editor .cm-line-heading-3 { margin-top: 1em !important; }

    /* ═══ Blockquote ═══ */
    .cm-editor .cm-blockquote-line {
      border-left: 3px solid var(--blockquote-border) !important;
      padding-left: 16px !important;
      color: var(--blockquote-color) !important;
    }

    /* ═══ List bullets ═══ */
    .cm-editor .cm-visual-bullet {
      color: var(--text-secondary) !important;
      margin-right: 6px !important;
      display: inline-block !important;
    }
    .cm-editor .cm-visual-number {
      color: var(--text-secondary) !important;
      margin-right: 4px !important;
      font-variant-numeric: tabular-nums !important;
    }

    /* ═══ Horizontal rule ═══ */
    .cm-editor .cm-visual-hr {
      border: none !important;
      border-top: 1px solid var(--hr-color) !important;
      margin: 1.5em 0 !important;
    }

    /* ═══ Image placeholder ═══ */
    .cm-editor .cm-visual-image {
      color: var(--accent) !important;
      font-size: 0.9em !important;
      font-style: italic !important;
    }

    /* ═══ Paragraph spacing ═══ */
    /* Visual mode: add spacing between paragraphs (blank lines between text blocks) */
    .cm-editor.visual-mode .cm-line:empty + .cm-line:not(:empty) {
      padding-top: 0.4em !important;
    }

    /* ═══ MD mode: show raw syntax ═══ */
    .cm-editor.md-mode .cm-content {
      font-family: var(--font-mono) !important;
      letter-spacing: normal !important;
    }

    /* ═══ Focus mode ═══ */
    .cm-editor.focus-mode .cm-line { transition: opacity 0.3s ease; }
    .cm-editor.focus-mode .cm-line.cm-dimmed-line { opacity: var(--focus-dim-opacity) !important; }

    /* ═══ Task markers ═══ */
    .cm-editor .cm-task-marker { color: var(--accent) !important; font-weight: 500 !important; }

    /* Switcher */
    #switcher-overlay {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.5); z-index:1000;
      justify-content:center; align-items:flex-start; padding-top:20vh; backdrop-filter:blur(4px);
    }
    #switcher-overlay.open { display:flex; }
    #switcher-box { background:var(--bg-editor); border:1px solid var(--border); border-radius:12px; width:480px; max-height:50vh; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    #switcher-input { width:100%; padding:16px 20px; font-family:var(--font-mono); font-size:14px; background:transparent; color:var(--text-primary); border:none; border-bottom:1px solid var(--border); outline:none; }
    #switcher-input::placeholder { color:var(--text-dim); }
    #switcher-list { list-style:none; max-height:40vh; overflow-y:auto; padding:4px; }
    .switcher-item { display:flex; align-items:center; padding:10px 16px; border-radius:8px; cursor:pointer; color:var(--text-primary); font-family:var(--font-mono); font-size:13px; transition:background .1s; }
    .switcher-item:hover, .switcher-item.selected { background:var(--selection); }
    .switcher-item .file-icon { margin-right:10px; color:var(--text-dim); }
    .switcher-item .file-name { flex:1; }
    .switcher-item .file-time { color:var(--text-dim); font-size:11px; }

    /* Scrollbar */
    #editor-wrapper::-webkit-scrollbar { width:6px; }
    #editor-wrapper::-webkit-scrollbar-track { background:transparent; }
    #editor-wrapper::-webkit-scrollbar-thumb { background:var(--text-faded); border-radius:3px; }
    #editor-wrapper::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

    /* Empty state */
    #empty-state { display:none; justify-content:center; align-items:center; height:100%; text-align:center; color:var(--text-dim); font-family:var(--font-display); }
    #empty-state.visible { display:flex; }
    #empty-state h2 { font-weight:700; font-size:24px; letter-spacing:var(--letter-spacing); color:var(--text-secondary); margin-bottom:8px; }
    #empty-state p { font-size:14px; }
    #empty-state kbd { background:var(--bg-main); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-family:var(--font-mono); font-size:12px; }

    /* ═══ CodeMirror tooltip overrides (fix dark popup in light mode) ═══ */
    .cm-tooltip {
      background: var(--bg-editor) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
      color: var(--text-primary) !important;
    }
    .cm-tooltip.cm-completionInfo,
    .cm-completionList {
      background: var(--bg-editor) !important;
    }
    .cm-completionList .cm-completionItem { color: var(--text-primary) !important; }
    .cm-completionList .cm-completionItem[aria-selected] { background: var(--selection) !important; }

    /* ═══ Command palette (Cmd+K) ═══ */
    #palette-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.25); z-index: 2000;
      justify-content: center; align-items: flex-start; padding-top: 15vh;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #palette-overlay.open { display: flex; }
    #palette-box {
      background: var(--bg-editor);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 620px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.22);
    }
    #palette-input {
      width: 100%; padding: 20px 24px;
      font-family: var(--font-display); font-size: 17px; font-weight: 400;
      letter-spacing: var(--letter-spacing);
      background: transparent; color: var(--text-primary);
      border: none; border-bottom: 1px solid var(--border); outline: none;
    }
    #palette-input::placeholder { color: var(--text-dim); }
    #palette-list { list-style: none; padding: 10px; }
    .palette-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 16px; border-radius: 10px; cursor: pointer;
      font-family: var(--font-display); font-size: 15px; font-weight: 500;
      color: var(--text-primary); transition: background .08s;
    }
    .palette-item:hover { background: rgba(0,0,0,0.06); }
    .palette-item.selected { background: var(--accent); color: #fff; }
    .palette-item.selected .palette-kbd { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); }
    .dark .palette-item:hover { background: rgba(255,255,255,0.06); }
    .palette-item .palette-icon { font-size: 16px; width: 26px; text-align: center; flex-shrink: 0; }
    .palette-item .palette-label { flex: 1; }
    .palette-item .palette-kbd {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
      background: var(--bg-main); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 0; white-space: nowrap; font-weight: 400;
      min-width: 76px; text-align: center; flex-shrink: 0;
    }

    /* ═══ Word count status bar ═══ */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      background: transparent;
      pointer-events: none;
      z-index: 10;
    }
    #word-count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);   /* legible in both light and dark */
      letter-spacing: 0;
      transition: opacity 0.3s;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-title-wrap">
      <input type="text" id="titlebar-title" value="Gabo" spellcheck="false" autocomplete="off" readonly>
      <span id="title-dirty"></span>
    </div>
    <div id="titlebar-actions">
      <!-- Dark/Light mode toggle -->
      <button class="icon-btn" id="btn-dark" title="Toggle Dark Mode (⌘⇧D)">
        <!-- Moon: shown in light mode -->
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.5 9.2C11.6 11.2 9.5 12.6 7 12.2C4 11.7 2 9 2.4 6C2.8 3 5.2 1.3 7.8 1.6C5.6 3 4.8 5.7 6.1 8C7.4 10.2 10 10.8 12.5 9.2Z" fill="currentColor"/>
        </svg>
        <!-- Sun: shown in dark mode -->
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="3" fill="currentColor"/>
          <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M3.05 3.05l1.06 1.06M9.89 9.89l1.06 1.06M3.05 10.95l1.06-1.06M9.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- Command palette -->
      <button class="icon-btn" id="btn-palette" title="Command Palette (⌘K)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="1.5" width="4" height="4" rx="1.2" fill="currentColor"/>
          <rect x="8.5" y="1.5" width="4" height="4" rx="1.2" fill="currentColor"/>
          <rect x="1.5" y="8.5" width="4" height="4" rx="1.2" fill="currentColor"/>
          <rect x="8.5" y="8.5" width="4" height="4" rx="1.2" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="editor-wrapper">
    <div id="editor-container"></div>
    <div id="empty-state">
      <div>
        <h2>Start writing</h2>
        <p>Press <kbd>⌘O</kbd> to open a file, or just start typing</p>
      </div>
    </div>
  </div>

  <!-- Command Palette (Cmd+K) -->
  <div id="palette-overlay">
    <div id="palette-box">
      <input type="text" id="palette-input" placeholder="Search actions…" autocomplete="off">
      <ul id="palette-list"></ul>
    </div>
  </div>

  <div id="switcher-overlay">
    <div id="switcher-box">
      <input type="text" id="switcher-input" placeholder="Search files..." autocomplete="off">
      <ul id="switcher-list"></ul>
    </div>
  </div>

  <div id="statusbar">
    <span id="word-count"></span>
  </div>

  <script src="renderer.bundle.js"></script>
</body>
</html>
